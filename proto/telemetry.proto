syntax = "proto3";

package wally.telemetry;

service TelemetryService {
  rpc StreamTelemetry (SubscribeRequest) returns (stream TelemetryResponse);
}

message SubscribeRequest {
  int64 last_message_id = 1;
}

message TelemetryResponse {
  string strategy = 1;
  int64 served_at = 2;
  RobotData data = 3;
}

message RobotData {
  int64 message_id = 1;
  string robot_id = 2;
  string server_timestamp = 3;
  string status = 4;
  int64 bricks_placed = 5;
  double bricks_per_minute = 6;
  string error_code = 7;
  double glue_quality = 8;
  int64 created_at = 9;
}
